      <path d="M59 16L23 36H95L59 16Z" fill="#111827"/>
      <path d="M31 46H87" stroke="#111827" stroke-width="7" stroke-linecap="round"/>
      <path d="M39 53V85M59 53V85M79 53V85" stroke="#111827" stroke-width="7" stroke-linecap="round"/>
      <path d="M29 95H89" stroke="#111827" stroke-width="8" stroke-linecap="round"/>
      <path d="M44 70H74" stroke="#F8FAFC" stroke-width="5" stroke-linecap="round"/>
      <path d="M44 82H64" stroke="#F8FAFC" stroke-width="5" stroke-linecap="round"/>
      <circle cx="84" cy="84" r="11" fill="#B38623"/>
      <path d="M79 84L83 88L90 80" stroke="#F8FAFC" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="180" y="72" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" letter-spacing="-0.5">SchoolClerk</text>
    <text x="180" y="104" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="650" letter-spacing="2.4">CIVIC LEDGER</text>
    <text x="34" y="188" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">Columns for reliability, ledger lines for</text>
    <text x="34" y="211" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">operations, approval dot for control.</text>
    <text x="34" y="235" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13">Quiet, operational, dependable dashboard tone.</text>
    <circle cx="38" cy="255" r="8" fill="#111827"/>
    <circle cx="62" cy="255" r="8" fill="#B38623"/>
    <text x="84" y="261" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13">Minimal, operational, authoritative</text>
  </g>
