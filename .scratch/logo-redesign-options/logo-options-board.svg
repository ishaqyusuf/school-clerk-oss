      <path d="M38 59C38 55.686 40.686 53 44 53H56C57.657 53 59 54.343 59 56V86C59 84.343 57.657 83 56 83H44C40.686 83 38 80.314 38 77V59Z" fill="#111827"/>
      <path d="M80 59C80 55.686 77.314 53 74 53H62C60.343 53 59 54.343 59 56V86C59 84.343 60.343 83 62 83H74C77.314 83 80 80.314 80 77V59Z" fill="#111827"/>
      <path d="M47 64H54M64 64H71M47 75H54M64 75H71" stroke="#F8FAFC" stroke-width="4" stroke-linecap="round"/>
      <path d="M45 46H73" stroke="#B38623" stroke-width="5" stroke-linecap="round"/>
    </g>
    <text x="180" y="72" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" letter-spacing="-0.5">SchoolClerk</text>
    <text x="180" y="104" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="650" letter-spacing="2.4">CLASSIC SEAL</text>
    <text x="34" y="188" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">The most traditional choice: seal, hall,</text>
    <text x="34" y="211" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">and open record in one compact badge.</text>
    <text x="34" y="235" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13">Highest formality; strongest school-facing tone.</text>
    <circle cx="38" cy="255" r="8" fill="#111827"/>
    <circle cx="62" cy="255" r="8" fill="#B38623"/>
    <text x="84" y="261" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13">Formal institutional badge</text>
  </g>

  <g transform="translate(620 510)">
    <rect width="500" height="292" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
    <g transform="translate(34 34)">
