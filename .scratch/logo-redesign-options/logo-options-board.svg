<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SchoolClerk logo redesign options</title>
  <desc id="desc">Four clean classic logo directions for SchoolClerk.</desc>
  <rect width="1200" height="1200" fill="#F8FAFC"/>
  <text x="80" y="92" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="760">SchoolClerk logo directions</text>
  <text x="82" y="130" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="17">Clean, classic marks for SaaS UI, school trust, favicons, email headers, and tenant surfaces.</text>

  <g transform="translate(80 178)">
    <rect width="500" height="292" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
    <g transform="translate(34 34)">
      <rect width="118" height="118" rx="26" fill="#F8FAFC"/>
      <path d="M59 14L18 36V46H100V36L59 14Z" fill="#111827"/>
      <path d="M29 58C29 54.686 31.686 52 35 52H83C86.314 52 89 54.686 89 58V96C89 99.314 86.314 102 83 102H35C31.686 102 29 99.314 29 96V58Z" fill="#111827"/>
      <path d="M43 68H76" stroke="#F8FAFC" stroke-width="6" stroke-linecap="round"/>
      <path d="M43 82H64" stroke="#F8FAFC" stroke-width="6" stroke-linecap="round"/>
      <path d="M75 82L81 88L92 75" stroke="#B38623" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M26 46H92" stroke="#B38623" stroke-width="5" stroke-linecap="round"/>
    </g>
    <text x="180" y="72" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" letter-spacing="-0.5">SchoolClerk</text>
    <text x="180" y="104" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="650" letter-spacing="2.4">LEDGER HALL</text>
    <text x="34" y="188" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">Evolves the current school-hall mark into</text>
    <text x="34" y="211" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">a sharper record-and-approval symbol.</text>
    <text x="34" y="235" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13">Continuity, confidence, strong small-size read.</text>
    <circle cx="38" cy="255" r="8" fill="#111827"/>
    <circle cx="62" cy="255" r="8" fill="#B38623"/>
    <text x="84" y="261" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13">Charcoal + restrained brass accent</text>
  </g>

  <g transform="translate(620 178)">
    <rect width="500" height="292" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
    <g transform="translate(34 34)">
      <rect width="118" height="118" rx="26" fill="#F8FAFC"/>
      <path d="M30 21H79C84.523 21 89 25.477 89 31V98H40C34.477 98 30 93.523 30 88V21Z" fill="#111827"/>
      <path d="M42 21V98" stroke="#B38623" stroke-width="6"/>
      <path d="M53 39H77" stroke="#F8FAFC" stroke-width="5" stroke-linecap="round"/>
      <path d="M53 79H77" stroke="#F8FAFC" stroke-width="5" stroke-linecap="round"/>
      <text x="65" y="70" text-anchor="middle" fill="#F8FAFC" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="700" letter-spacing="-2">SC</text>
    </g>
    <text x="180" y="72" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" letter-spacing="-0.5">SchoolClerk</text>
    <text x="180" y="104" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="650" letter-spacing="2.4">REGISTER MONOGRAM</text>
    <text x="34" y="188" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">A refined wordmark system anchored by</text>
    <text x="34" y="211" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">a ledger-book SC monogram.</text>
    <text x="34" y="235" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13">Most premium and strongest as an app icon.</text>
    <circle cx="38" cy="255" r="8" fill="#111827"/>
    <circle cx="62" cy="255" r="8" fill="#B38623"/>
    <text x="84" y="261" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13">Editorial, composed, slightly more classic</text>
  </g>

  <g transform="translate(80 510)">
    <rect width="500" height="292" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
    <g transform="translate(34 34)">
      <rect width="118" height="118" rx="26" fill="#F8FAFC"/>
      <circle cx="59" cy="59" r="42" fill="#111827"/>
      <circle cx="59" cy="59" r="32" fill="#F8FAFC"/>
