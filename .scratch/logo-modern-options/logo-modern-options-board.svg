<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SchoolClerk modern logo redesign options</title>
  <desc id="desc">Four modern logo directions for SchoolClerk.</desc>
  <rect width="1200" height="1200" fill="#F8FAFC"/>
  <text x="80" y="92" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="760">SchoolClerk modern logo directions</text>
  <text x="82" y="130" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="17">Cleaner SaaS identity, stronger dashboard fit, still grounded in school operations and trust.</text>

  <g transform="translate(80 208)">
    <rect width="520" height="320" rx="22" fill="#FFFFFF" stroke="#E2E8F0"/>
    <g transform="translate(40 40)">
      <rect width="118" height="118" rx="28" fill="#F8FAFC"/>
      <rect x="17" y="17" width="84" height="84" rx="22" fill="#0F172A"/>
      <rect x="31" y="31" width="22" height="22" rx="7" fill="#F8FAFC"/>
      <rect x="65" y="31" width="22" height="22" rx="7" fill="#38BDF8"/>
      <rect x="31" y="65" width="22" height="22" rx="7" fill="#14B8A6"/>
      <path d="M67 72H76C82.075 72 87 76.925 87 83V87" stroke="#F8FAFC" stroke-width="7" stroke-linecap="round"/>
      <path d="M48 48C56 56 64 64 73 72" stroke="#F8FAFC" stroke-width="7" stroke-linecap="round"/>
      <circle cx="87" cy="87" r="8" fill="#F59E0B"/>
    </g>
    <text x="190" y="78" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="760" letter-spacing="-0.7">SchoolClerk</text>
    <text x="192" y="110" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2.3">COMMAND GRID</text>
    <text x="40" y="208" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">A product-first mark: dashboard tiles, workflow path,</text>
    <text x="40" y="231" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">and completion dot in one compact icon.</text>
    <text x="40" y="258" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13">Best for a modern SaaS admin platform.</text>
    <circle cx="44" cy="290" r="8" fill="#0F172A"/>
    <circle cx="68" cy="290" r="8" fill="#14B8A6"/>
    <circle cx="92" cy="290" r="8" fill="#38BDF8"/>
    <text x="116" y="296" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13">Ink, teal, sky, small amber cue</text>
  </g>

  <g transform="translate(640 208)">
    <rect width="520" height="320" rx="22" fill="#FFFFFF" stroke="#E2E8F0"/>
    <g transform="translate(40 40)">
      <rect width="118" height="118" rx="28" fill="#F8FAFC"/>
      <path d="M27 45L59 25L91 45" stroke="#0F172A" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M32 56H86" stroke="#0F172A" stroke-width="8" stroke-linecap="round"/>
      <path d="M43 73C52 64 66 64 75 73" stroke="#14B8A6" stroke-width="7" stroke-linecap="round"/>
      <path d="M34 87C48 72 70 72 84 87" stroke="#38BDF8" stroke-width="7" stroke-linecap="round"/>
      <circle cx="59" cy="89" r="10" fill="#0F172A"/>
      <circle cx="59" cy="89" r="4" fill="#F8FAFC"/>
    </g>
    <text x="190" y="78" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="760" letter-spacing="-0.7">SchoolClerk</text>
    <text x="192" y="110" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2.3">CAMPUS SIGNAL</text>
    <text x="40" y="208" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">A school roofline turned into a digital signal,</text>
    <text x="40" y="231" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">suggesting connected campuses and live operations.</text>
    <text x="40" y="258" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13">Best if the brand should still say education quickly.</text>
    <circle cx="44" cy="290" r="8" fill="#0F172A"/>
    <circle cx="68" cy="290" r="8" fill="#14B8A6"/>
    <circle cx="92" cy="290" r="8" fill="#38BDF8"/>
    <text x="116" y="296" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13">Institutional, connected, lighter touch</text>
  </g>

  <g transform="translate(80 580)">
    <rect width="520" height="320" rx="22" fill="#FFFFFF" stroke="#E2E8F0"/>
    <g transform="translate(40 40)">
      <rect width="118" height="118" rx="28" fill="#F8FAFC"/>
      <path d="M77 31H50C40.059 31 32 39.059 32 49C32 58.941 40.059 67 50 67H68C77.941 67 86 75.059 86 85C86 94.941 77.941 103 68 103H40" stroke="#0F172A" stroke-width="12" stroke-linecap="round"/>
      <path d="M79 31C60 31 44 47 44 67C44 87 60 103 79 103" stroke="#14B8A6" stroke-width="12" stroke-linecap="round"/>
      <circle cx="79" cy="31" r="7" fill="#F59E0B"/>
      <circle cx="40" cy="103" r="7" fill="#38BDF8"/>
    </g>
    <text x="190" y="78" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="760" letter-spacing="-0.7">SchoolClerk</text>
    <text x="192" y="110" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2.3">CLERK FLOW</text>
    <text x="40" y="208" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">An abstract SC monogram drawn like a process</text>
    <text x="40" y="231" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">moving cleanly from intake to completion.</text>
    <text x="40" y="258" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13">Best for a distinct, ownable app icon.</text>
    <circle cx="44" cy="290" r="8" fill="#0F172A"/>
    <circle cx="68" cy="290" r="8" fill="#14B8A6"/>
    <circle cx="92" cy="290" r="8" fill="#F59E0B"/>
    <text x="116" y="296" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13">More abstract, more brandable</text>
  </g>

  <g transform="translate(640 580)">
    <rect width="520" height="320" rx="22" fill="#FFFFFF" stroke="#E2E8F0"/>
    <g transform="translate(40 40)">
      <rect width="118" height="118" rx="28" fill="#F8FAFC"/>
      <rect x="26" y="20" width="66" height="78" rx="17" fill="#0F172A"/>
      <rect x="39" y="37" width="40" height="7" rx="3.5" fill="#F8FAFC"/>
      <rect x="39" y="54" width="29" height="7" rx="3.5" fill="#64748B"/>
      <rect x="39" y="71" width="40" height="7" rx="3.5" fill="#F8FAFC"/>
      <path d="M78 56L83 68L94 73L83 78L78 90L73 78L62 73L73 68L78 56Z" fill="#14B8A6"/>
      <path d="M32 27H24V42" stroke="#38BDF8" stroke-width="5" stroke-linecap="round"/>
      <path d="M86 91H94V76" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
    </g>
    <text x="190" y="78" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="760" letter-spacing="-0.7">SchoolClerk</text>
    <text x="192" y="110" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2.3">SMART LEDGER</text>
    <text x="40" y="208" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">A student record card with a subtle automation</text>
    <text x="40" y="231" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">spark for AI, reports, and administrative control.</text>
    <text x="40" y="258" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13">Best if AI-assisted operations should be visible.</text>
    <circle cx="44" cy="290" r="8" fill="#0F172A"/>
    <circle cx="68" cy="290" r="8" fill="#14B8A6"/>
    <circle cx="92" cy="290" r="8" fill="#38BDF8"/>
    <text x="116" y="296" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13">Smart, crisp, record-first</text>
  </g>
