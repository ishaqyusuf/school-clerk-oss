<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>School Clerk Premium Single-Color Logos</title>
    <style>
      :root {
        color: #111827;
        background: #f3f4f6;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 32px;
      }

      main {
        max-width: 1320px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0 0 24px;
        color: #4b5563;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      figure {
        margin: 0;
      }

      figcaption {
        margin: 10px 4px 0;
        color: #374151;
        font-size: 14px;
        font-weight: 650;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        background: #f8fafc;
      }

      @media (max-width: 840px) {
        body {
          padding: 20px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>School Clerk Premium Single-Color Logos</h1>
      <p>Simple one-color directions using the same ink tone for mark and wordmark.</p>
      <section class="grid" aria-label="Premium logo options">
        <figure>
          <img src="./option-a-ledger-seal.svg" alt="Premium single-color logo option A" />
          <figcaption>A. Ledger seal</figcaption>
        </figure>
        <figure>
          <img src="./option-b-folded-record.svg" alt="Premium single-color logo option B" />
          <figcaption>B. Folded record</figcaption>
        </figure>
        <figure>
          <img src="./option-c-clerk-monogram.svg" alt="Premium single-color logo option C" />
          <figcaption>C. Clerk monogram</figcaption>
        </figure>
        <figure>
          <img src="./option-d-column-mark.svg" alt="Premium single-color logo option D" />
          <figcaption>D. Column mark</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
