<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>School Clerk Logo Options</title>
    <style>
      :root {
        color: #111827;
        background: #f3f4f6;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 32px;
      }

      main {
        max-width: 1320px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0 0 24px;
        color: #4b5563;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      figure {
        margin: 0;
      }

      figcaption {
        margin: 10px 4px 0;
        font-size: 14px;
        font-weight: 650;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        background: #f8fafc;
      }

      @media (max-width: 840px) {
        body {
          padding: 20px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>School Clerk Logo Options</h1>
      <p>Four flat vector directions based on the existing indigo ledger mark and blue-green status motif.</p>
      <section class="grid" aria-label="Logo options">
        <figure>
          <img src="./logo-option-a.svg" alt="School Clerk logo option A" />
          <figcaption>A. Refined ledger</figcaption>
        </figure>
        <figure>
          <img src="./logo-option-b.svg" alt="School Clerk logo option B" />
          <figcaption>B. Book + checklist</figcaption>
        </figure>
        <figure>
          <img src="./logo-option-c.svg" alt="School Clerk logo option C" />
          <figcaption>C. SC monogram</figcaption>
        </figure>
        <figure>
          <img src="./logo-option-d.svg" alt="School Clerk logo option D" />
          <figcaption>D. Admin shield</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
