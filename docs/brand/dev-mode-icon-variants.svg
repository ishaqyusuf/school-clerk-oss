<svg width="1040" height="620" viewBox="0 0 1040 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>School Clerk dev mode icon color variants</title>
  <desc>Eight sample color variants for a development mode app icon using the current School Clerk mark.</desc>
  <rect width="1040" height="620" fill="#F8FAFC"/>
  <text x="40" y="54" fill="#111827" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="26" font-weight="720">School Clerk Dev Icon Variants</text>
  <text x="40" y="84" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14">Same mark, different dev-mode color treatments. Pick a letter and I can wire it into the app assets.</text>

  <defs>
    <path id="school-clerk-mark" fill-rule="evenodd" d="M64 16 18 40v11c0 3.314 2.686 6 6 6h80c3.314 0 6-2.686 6-6V40L64 16ZM32 66a6 6 0 0 0-6 6v40a6 6 0 0 0 6 6h64a6 6 0 0 0 6-6V72a6 6 0 0 0-6-6H32Zm16 14a5 5 0 0 0 0 10h32a5 5 0 0 0 0-10H48Zm0 17a5 5 0 0 0 0 10h21a5 5 0 0 0 0-10H48Zm37 0a5 5 0 1 0 0 10h1a5 5 0 1 0 0-10h-1Z"/>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <clipPath id="icon-clip">
      <rect width="128" height="128" rx="28"/>
    </clipPath>
  </defs>

