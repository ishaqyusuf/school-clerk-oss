    <text x="22" y="193" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12">Warm, obvious, release-warning feel</text>
  </g>

  <g transform="translate(284 126)">
