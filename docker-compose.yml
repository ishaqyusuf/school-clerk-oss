services:
  postgres:
    image: postgres:16-alpine
    container_name: school-clerk-postgres
    restart: unless-stopped
    ports:
      - "55432:5432"
    environment:
      POSTGRES_DB: school_clerk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - school-clerk-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d school_clerk"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  school-clerk-postgres-data:
